<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
{{__base}}
<div class="card">
  <div class="eyebrow">MYTH VS FACT</div>

  <div style="margin-bottom: 56px;">
    <div style="font-family: 'JetBrains Mono', monospace; font-size: 27px; letter-spacing: 0.28em; color: var(--faint); margin-bottom: 20px;">THE MYTH</div>
    <h1 class="display" style="font-size: 60px; color: var(--faint); text-decoration: line-through; text-decoration-color: var(--dawn-1); text-decoration-thickness: 5px; max-width: 880px;">&ldquo;{{myth}}&rdquo;</h1>
  </div>

  <div>
    <div style="font-family: 'JetBrains Mono', monospace; font-size: 27px; letter-spacing: 0.28em; color: var(--dawn-2); margin-bottom: 20px;">THE FACT</div>
    <h1 class="display" style="font-size: 66px; max-width: 900px;">{{fact}}</h1>
  </div>

  <div class="horizon-rule"></div>
  <p class="body-copy" style="font-size: 30px;">{{body}}</p>

  <div class="footer">
    <span class="handle">{{handle}}</span>
    <span class="url">{{url}}</span>
  </div>
</div>
</body>
</html>
