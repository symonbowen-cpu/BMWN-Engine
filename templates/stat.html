<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
{{__base}}
<div class="card">
  <div class="eyebrow">{{eyebrow}}</div>
  <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; margin-top: -120px;">
    <div class="display accent" style="font-size: 236px; line-height: 0.95; letter-spacing: -0.03em;">{{stat}}</div>
    <h1 class="display" style="font-size: 62px; margin-top: 36px; max-width: 880px;">{{headline}}</h1>
    <div class="horizon-rule"></div>
    <p class="body-copy" style="font-size: 31px;">{{body}}</p>
  </div>
  <div class="footer">
    <span class="handle">{{handle}}</span>
    <span class="url">{{url}}</span>
  </div>
</div>
</body>
</html>
