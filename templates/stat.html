<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
{{__base}}
<div class="card">
  <div class="eyebrow">{{eyebrow}}</div>
  <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; min-height: 0; padding-bottom: 40px;">
    <div class="display accent" style="font-size: 220px; line-height: 0.92; letter-spacing: -0.03em;">{{stat}}</div>
    <h1 class="display" style="font-size: 58px; margin-top: 32px; max-width: 880px;">{{headline}}</h1>
    <div class="horizon-rule" style="margin: 40px 0;"></div>
    <p class="body-copy" style="font-size: 30px; max-width: 800px;">{{body}}</p>
  </div>
  <div class="footer" style="position: static; left: auto; right: auto; bottom: auto; margin: 0 0 250px;">
    <span class="handle">{{handle}}</span>
    <span class="url">{{url}}</span>
  </div>
</div>
</body>
</html>
