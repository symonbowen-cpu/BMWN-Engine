<!-- Injected into every template as {{__base}}. Fonts are inlined as base64 at render time. -->
<style>
  @font-face {
    font-family: 'Archivo Black';
    src: url(data:font/woff2;base64,{{font_display}}) format('woff2');
    font-weight: 400;
  }
  @font-face {
    font-family: 'Inter';
    src: url(data:font/woff2;base64,{{font_body}}) format('woff2');
    font-weight: 400;
  }
  @font-face {
    font-family: 'Inter';
    src: url(data:font/woff2;base64,{{font_body_semibold}}) format('woff2');
    font-weight: 600;
  }
  @font-face {
    font-family: 'JetBrains Mono';
    src: url(data:font/woff2;base64,{{font_mono}}) format('woff2');
    font-weight: 500;
  }

  :root {
    --ink: #0E1420;        /* Mojave night */
    --dusk: #1B2436;       /* elevated panel */
    --dawn-1: #FF6B2C;     /* dawn orange */
    --dawn-2: #FFB347;     /* desert gold */
    --sand: #EDE6D8;       /* warm off-white */
    --faint: #8B93A5;      /* muted slate */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { width: 1080px; height: 1080px; }

  body {
    background: var(--ink);
    color: var(--sand);
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* faint desert-sky vertical wash */
  .sky {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, #0E1420 0%, #101828 55%, #1A2030 100%);
  }

  .card {
    position: relative;
    width: 1080px; height: 1080px;
    padding: 96px 96px 0;
    display: flex; flex-direction: column;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: 26px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--dawn-2);
    margin-bottom: 44px;
  }

  .display {
    font-family: 'Archivo Black', sans-serif;
    color: var(--sand);
    line-height: 1.06;
    letter-spacing: -0.01em;
  }

  .accent { color: var(--dawn-1); }

  .body-copy {
    font-size: 34px;
    font-weight: 400;
    line-height: 1.5;
    color: var(--faint);
    max-width: 820px;
  }

  .horizon-rule {
    height: 4px; width: 140px; border-radius: 2px;
    background: linear-gradient(90deg, var(--dawn-1), var(--dawn-2));
    margin: 52px 0;
  }

  /* footer pinned to the very bottom edge of the card */
  .footer {
    margin-top: auto;
    margin-bottom: 24px;
    padding-top: 40px;
    display: flex; justify-content: space-between; align-items: baseline;
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px; letter-spacing: 0.08em;
  }
  .footer .handle { color: var(--sand); font-weight: 500; }
  .footer .url { color: var(--dawn-2); }

  /* signature: dawn glow rising behind a Mojave ridgeline */
  .ridge-wrap { position: absolute; left: 0; right: 0; bottom: 0; height: 190px; }
  .glow {
    position: absolute; left: 50%; bottom: -340px; transform: translateX(-50%);
    width: 1500px; height: 620px; border-radius: 50%;
    background: radial-gradient(ellipse at center,
      rgba(255,107,44,0.42) 0%, rgba(255,179,71,0.16) 42%, rgba(14,20,32,0) 70%);
  }
  .ridge { position: absolute; left: 0; right: 0; bottom: 0; display: block; }
</style>

<div class="sky"></div>

<div class="ridge-wrap">
  <div class="glow"></div>
  <svg class="ridge" width="1080" height="150" viewBox="0 0 1080 150" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <!-- far ridge -->
    <path d="M0,96 L120,66 L240,88 L390,44 L520,80 L660,36 L800,74 L930,52 L1080,84 L1080,150 L0,150 Z"
          fill="#151D2C"/>
    <!-- near ridge -->
    <path d="M0,122 L150,92 L300,116 L470,78 L620,110 L780,72 L920,104 L1080,86 L1080,150 L0,150 Z"
          fill="#0A0F18"/>
    <!-- horizon light line tracing the far ridge -->
    <path d="M0,96 L120,66 L240,88 L390,44 L520,80 L660,36 L800,74 L930,52 L1080,84"
          fill="none" stroke="url(#dawnline)" stroke-width="3"/>
    <defs>
      <linearGradient id="dawnline" x1="0" y1="0" x2="1080" y2="0" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#FF6B2C"/>
        <stop offset="0.5" stop-color="#FFB347"/>
        <stop offset="1" stop-color="#FF6B2C"/>
      </linearGradient>
    </defs>
  </svg>
</div>
