name: Daily Instagram Post

on:
  schedule:
    - cron: "37 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: posting
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate today's post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node src/generate.js

      - name: Host image as release asset
        id: host
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="post-$(date -u +%F)"
          gh release create "$TAG" --title "$TAG" --notes "daily post" || true
          gh release upload "$TAG" out/pending/post.png --clobber
          echo "url=https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/post.png" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # ---------- PATH A: fully autonomous ----------
      - name: Publish to Instagram (auto mode)
        if: vars.AUTO_PUBLISH == 'true'
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_GRAPH_HOST: ${{ vars.IG_GRAPH_HOST }}
          IMAGE_PUBLIC_URL: ${{ steps.host.outputs.url }}
        run: node src/publish.js

      - name: Clean up release (auto mode)
        if: vars.AUTO_PUBLISH == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 60
          gh release delete "${{ steps.host.outputs.tag }}" --yes --cleanup-tag || true

      # ---------- PATH B: approval mode ----------
      - name: Open approval issue
        if: vars.AUTO_PUBLISH != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "pending-post" --color "F97316" --description "Post awaiting approval" || true
          CAPTION=$(node -e "console.log(require('./out/pending/post.json').caption)")
          IMG="${{ steps.host.outputs.url }}"
          gh issue create \
            --title "Approve post: $(date -u +%F)" \
            --label "pending-post" \
            --body "$(printf '![preview](%s)\n\n**Caption:**\n\n```\n%s\n```\n\n---\nComment **/approve** to publish, or **/skip** to discard.\n\n<!-- img_url=%s tag=%s -->' "$IMG" "$CAPTION" "$IMG" "${{ steps.host.outputs.tag }}")"

      # ---------- state commit LAST so it can never block a post ----------
      - name: Commit rotation state
        run: |
          git config user.name "bmwn-content-engine"
          git config user.email "actions@users.noreply.github.com"
          # keep state + archive metadata in git; never the pending image
          git add -A content/ out/published/ 2>/dev/null || true
          git add content/state.json
          git commit -m "content: post $(date -u +%F)" || { echo "nothing to commit"; exit 0; }
          for i in 1 2 3; do
            git push && exit 0
            git fetch origin main
            git rebase -X theirs origin/main || { git rebase --abort; git reset --hard origin/main; exit 0; }
            sleep 3
          done
          echo "::warning::state push failed after retries; tomorrow may repeat a topic"
