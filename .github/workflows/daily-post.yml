name: Daily Instagram Post

on:
  schedule:
    - cron: "37 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: posting
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate today's post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node src/generate.js

      - name: Build story frame + story video with music
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q ffmpeg
          node src/make_story.js
          # rotate music track by day of year (matches the reel engine)
          TRACKS=(assets/music/*.mp3)
          if [ -e "${TRACKS[0]}" ]; then
            IDX=$(( $(date +%-j) % ${#TRACKS[@]} ))
            TRACK="${TRACKS[$IDX]}"
            echo "Story music: $TRACK"
            ffmpeg -y -loop 1 -i out/pending/story.png -i "$TRACK" \
              -filter_complex "[0:v]zoompan=z='1+0.06*on/240':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=240:s=1080x1920:fps=30,format=yuv420p[v];[1:a]volume=0.5,afade=t=in:d=0.5,afade=t=out:st=6.4:d=1.6,atrim=0:8[a]" \
              -map "[v]" -map "[a]" -t 8 -c:v libx264 -c:a aac -movflags +faststart out/pending/story.mp4
          else
            echo "No music tracks found; story will be a silent image"
          fi

      - name: Host media as release assets
        id: host
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="post-$(date -u +%F)"
          gh release create "$TAG" --title "$TAG" --notes "daily post" || true
          gh release upload "$TAG" out/pending/post.png --clobber
          echo "url=https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/post.png" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ -f out/pending/story.mp4 ]; then
            gh release upload "$TAG" out/pending/story.mp4 --clobber
            echo "story_url=https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/story.mp4" >> "$GITHUB_OUTPUT"
          fi

      # ---------- PATH A: fully autonomous ----------
      - name: Publish to Instagram (auto mode)
        if: vars.AUTO_PUBLISH == 'true'
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_GRAPH_HOST: ${{ vars.IG_GRAPH_HOST }}
          IMAGE_PUBLIC_URL: ${{ steps.host.outputs.url }}
          STORY_VIDEO_URL: ${{ steps.host.outputs.story_url }}
        run: node src/publish.js

      - name: Clean up release (auto mode)
        if: vars.AUTO_PUBLISH == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 120
          gh release delete "${{ steps.host.outputs.tag }}" --yes --cleanup-tag || true

      # ---------- PATH B: approval mode ----------
      - name: Open approval issue
        if: vars.AUTO_PUBLISH != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "pending-post" --color "F97316" --description "Post awaiting approval" || true
          CAPTION=$(node -e "console.log(require('./out/pending/post.json').caption)")
          IMG="${{ steps.host.outputs.url }}"
          gh issue create \
            --title "Approve post: $(date -u +%F)" \
            --label "pending-post" \
            --body "$(printf '![preview](%s)\n\n**Caption:**\n\n```\n%s\n```\n\n---\nComment **/approve** to publish, or **/skip** to discard.\n\n<!-- img_url=%s tag=%s -->' "$IMG" "$CAPTION" "$IMG" "${{ steps.host.outputs.tag }}")"

      # ---------- state commit LAST so it can never block a post ----------
      - name: Commit rotation state
        run: |
          git config user.name "bmwn-content-engine"
          git config user.email "actions@users.noreply.github.com"
          # keep state + archive metadata in git; never the pending image
          git add -A content/ out/published/ 2>/dev/null || true
          git add content/state.json
          git commit -m "content: post $(date -u +%F)" || { echo "nothing to commit"; exit 0; }
          for i in 1 2 3; do
            git push && exit 0
            git fetch origin main
            git rebase -X theirs origin/main || { git rebase --abort; git reset --hard origin/main; exit 0; }
            sleep 3
          done
          echo "::warning::state push failed after retries; tomorrow may repeat a topic"
