name: Daily Instagram Post

on:
  schedule:
    - cron: "37 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: posting
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.push.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate today's post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node src/generate.js

      - name: Commit pending post + rotation state
        id: push
        run: |
          git config user.name "bmwn-content-engine"
          git config user.email "actions@users.noreply.github.com"
          git add out/pending content/state.json
          git commit -m "content: draft post $(date -u +%F)"
          for i in 1 2 3; do git pull --rebase origin main && git push && break || sleep 5; done
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # ---------- PATH A: fully autonomous ----------
      - name: Publish to Instagram (auto mode)
        if: vars.AUTO_PUBLISH == 'true'
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_GRAPH_HOST: ${{ vars.IG_GRAPH_HOST }}
          GITHUB_SHA: ${{ steps.push.outputs.sha }}
        run: node src/publish.js

      - name: Commit publish archive (auto mode)
        if: vars.AUTO_PUBLISH == 'true'
        run: |
          git add -A out/
          git commit -m "content: published $(date -u +%F)" || echo "nothing to commit"
          for i in 1 2 3; do git pull --rebase origin main && git push && break || sleep 5; done

      # ---------- PATH B: approval mode ----------
      - name: Open approval issue
        if: vars.AUTO_PUBLISH != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "pending-post" --color "F97316" --description "Post awaiting approval" || true
          CAPTION=$(node -e "console.log(require('./out/pending/post.json').caption)")
          SHA="${{ steps.push.outputs.sha }}"
          IMG="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${SHA}/out/pending/post.png"
          gh issue create \
            --title "Approve post: $(date -u +%F)" \
            --label "pending-post" \
            --body "$(printf '![preview](%s)\n\n**Caption:**\n\n```\n%s\n```\n\n---\nComment **/approve** to publish, or **/skip** to discard.' "$IMG" "$CAPTION")"
